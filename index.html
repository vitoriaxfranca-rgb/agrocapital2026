<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroCapital 2026 — Painel de Cobertura</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #0a4a2e;
  --verde-medio: #1a6b44;
  --verde-claro: #2a8a5a;
  --verde-bg: #061e13;
  --ouro: #e8a020;
  --ouro-claro: #f5c050;
  --ouro-bg: rgba(232,160,32,0.12);
  --branco: #f0ede6;
  --cinza: #8a9a90;
  --cinza-escuro: #2a3a30;
  --card-bg: rgba(10,74,46,0.35);
  --card-border: rgba(232,160,32,0.2);
  --success: #4ade80;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--verde-bg);color:var(--branco);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── BACKGROUND TEXTURE ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(26,107,68,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(232,160,32,0.1) 0%, transparent 55%),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.015) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.015) 61px);
  pointer-events:none;z-index:0;
}

.app{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:24px 16px 80px}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:36px;padding-top:12px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:4px;color:var(--ouro);line-height:1;text-shadow:0 0 40px rgba(232,160,32,0.4)}
.header-sub{font-size:13px;color:var(--cinza);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.header-tagline{font-size:15px;color:var(--verde-claro);margin-top:8px;font-style:italic}

/* ── PROGRESSO GERAL ── */
.progresso-geral{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:20px 24px;
  margin-bottom:28px;
  backdrop-filter:blur(10px);
}
.pg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pg-titulo{font-size:12px;color:var(--cinza);letter-spacing:2px;text-transform:uppercase}
.pg-pct{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--ouro);line-height:1}
.pg-barra-wrap{height:10px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;margin-bottom:8px}
.pg-barra{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--verde-claro),var(--ouro));transition:width 0.6s cubic-bezier(.4,0,.2,1);position:relative}
.pg-barra::after{content:'';position:absolute;right:0;top:0;bottom:0;width:6px;background:var(--ouro-claro);border-radius:3px;box-shadow:0 0 10px var(--ouro)}
.pg-stats{display:flex;gap:24px}
.pg-stat{font-size:12px;color:var(--cinza)}
.pg-stat span{color:var(--branco);font-weight:500}

/* ── CALENDÁRIO ── */
.calendario{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.cal-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:14px;
  padding:16px 12px;
  cursor:pointer;
  transition:all 0.25s ease;
  text-align:center;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(8px);
}
.cal-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,160,32,0.05),transparent);opacity:0;transition:opacity 0.25s}
.cal-card:hover{border-color:rgba(232,160,32,0.5);transform:translateY(-2px)}
.cal-card:hover::before{opacity:1}
.cal-card.ativo{border-color:var(--ouro);background:rgba(232,160,32,0.15);box-shadow:0 0 24px rgba(232,160,32,0.2)}
.cal-card.concluido{border-color:var(--success);background:rgba(74,222,128,0.08)}
.cal-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--ouro);line-height:1}
.cal-mes{font-size:10px;color:var(--cinza);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.cal-dia{font-size:11px;color:var(--verde-claro);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cal-tema{font-size:10px;color:var(--cinza);line-height:1.4;margin-bottom:10px}
.cal-minibarra{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.cal-minifill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--verde-claro),var(--ouro));transition:width 0.5s ease}
.cal-pct-txt{font-size:10px;color:var(--cinza);margin-top:4px}
.cal-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--success);display:none;align-items:center;justify-content:center;font-size:10px}
.cal-card.concluido .cal-check{display:flex}

/* ── CONTEÚDO DO DIA ── */
.dia-conteudo{display:none}
.dia-conteudo.ativo{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.dia-header{
  background:linear-gradient(135deg,var(--verde),var(--verde-medio));
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:24px 28px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
.dia-header::after{
  content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(232,160,32,0.15),transparent 70%);
}
.dia-header-num{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--ouro);letter-spacing:3px}
.dia-header-titulo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--branco);letter-spacing:2px;margin:4px 0}
.dia-header-tema{font-size:13px;color:rgba(240,237,230,0.7);font-style:italic}
.dia-progresso-local{margin-top:14px;display:flex;align-items:center;gap:12px}
.dia-prog-barra{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.dia-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ouro-claro),var(--ouro));transition:width 0.5s ease}
.dia-prog-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ouro);min-width:48px;text-align:right}

/* ── ALERTA ── */
.alerta{
  background:rgba(232,160,32,0.12);
  border:1px solid rgba(232,160,32,0.4);
  border-left:4px solid var(--ouro);
  border-radius:10px;
  padding:14px 18px;
  margin-bottom:18px;
  font-size:13px;
  color:rgba(240,237,230,0.9);
  line-height:1.6;
}
.alerta strong{color:var(--ouro)}

/* ── PROGRAMAÇÃO ── */
.secao-titulo{
  font-size:11px;color:var(--ouro);letter-spacing:2.5px;text-transform:uppercase;
  margin:20px 0 10px;display:flex;align-items:center;gap:8px;
}
.secao-titulo::after{content:'';flex:1;height:1px;background:rgba(232,160,32,0.2)}
.prog-tabela{width:100%;border-collapse:collapse;margin-bottom:4px}
.prog-tabela tr{border-bottom:1px solid rgba(255,255,255,0.05)}
.prog-tabela td{padding:8px 10px;font-size:12px;vertical-align:top}
.prog-hora{color:var(--ouro-claro);font-weight:600;white-space:nowrap;width:100px}
.prog-tema{color:var(--branco)}
.prog-local{color:var(--cinza);font-style:italic;text-align:right;white-space:nowrap}
.badge-mulher{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(255,100,180,0.2);color:#ffb3d9;margin-left:6px}
.badge-aud{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(100,150,255,0.2);color:#b3c8ff;margin-left:6px}
.badge-palco{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(232,160,32,0.2);color:var(--ouro-claro);margin-left:6px}

/* ── REELS ── */
.reel-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:14px;
  margin-bottom:14px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}
.reel-header{
  background:linear-gradient(90deg,rgba(10,74,46,0.8),rgba(26,107,68,0.4));
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  border-bottom:1px solid rgba(232,160,32,0.15);
  user-select:none;
}
.reel-num-badge{
  width:32px;height:32px;border-radius:50%;
  background:var(--ouro);color:var(--verde-bg);
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.reel-info{flex:1}
.reel-titulo{font-size:14px;font-weight:600;color:var(--branco);line-height:1.3}
.reel-dur{font-size:11px;color:var(--cinza);margin-top:2px}
.reel-toggle{font-size:18px;color:var(--cinza);transition:transform 0.25s}
.reel-toggle.aberto{transform:rotate(180deg)}
.reel-body{padding:0 20px;max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s}
.reel-body.aberto{max-height:9999px;padding:16px 20px}

.contexto-box{
  background:rgba(26,107,68,0.2);
  border-left:3px solid var(--verde-claro);
  border-radius:0 8px 8px 0;
  padding:12px 16px;
  font-size:13px;color:rgba(240,237,230,0.85);
  line-height:1.7;margin-bottom:16px;
}

/* ── TAKES ── */
.take-bloco{
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.take-bloco.concluido{border-color:rgba(74,222,128,0.3)}
.take-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:rgba(255,255,255,0.03);
  cursor:pointer;user-select:none;
}
.take-cb{
  width:20px;height:20px;border-radius:5px;
  border:2px solid rgba(255,255,255,0.2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;color:transparent;font-size:11px;font-weight:700;
}
.take-cb.ok{background:var(--success);border-color:var(--success);color:var(--verde-bg)}
.take-num{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--ouro);min-width:28px}
.take-titulo-txt{font-size:13px;font-weight:500;color:var(--branco);flex:1;line-height:1.3}
.take-titulo-txt.ok{text-decoration:line-through;color:var(--cinza)}
.take-expand{font-size:14px;color:var(--cinza);transition:transform 0.2s}
.take-expand.aberto{transform:rotate(180deg)}
.take-detalhe{padding:0 14px;max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.25s}
.take-detalhe.aberto{max-height:999px;padding:2px 14px 14px}
.take-campo{margin-bottom:10px}
.take-label{font-size:9px;color:var(--ouro);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.take-valor{font-size:12px;color:rgba(240,237,230,0.85);line-height:1.65;background:rgba(0,0,0,0.15);border-radius:6px;padding:8px 12px}
.take-valor.destaque{background:rgba(232,160,32,0.1);border:1px solid rgba(232,160,32,0.2);color:var(--ouro-claro)}

/* ── CHECKLIST TAKES/FOTOS ── */
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
@media(max-width:600px){.checklist-grid{grid-template-columns:1fr}}
.chk-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:9px 12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;cursor:pointer;
  transition:all 0.2s;
}
.chk-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(232,160,32,0.2)}
.chk-item.ok{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.25)}
.chk-box{
  width:16px;height:16px;border-radius:4px;
  border:1.5px solid rgba(255,255,255,0.2);
  flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:transparent;
  transition:all 0.2s;
}
.chk-box.ok{background:var(--success);border-color:var(--success);color:var(--verde-bg)}
.chk-txt{font-size:11px;color:rgba(240,237,230,0.8);line-height:1.4;flex:1}
.chk-txt.ok{text-decoration:line-through;color:var(--cinza)}
.chk-badge{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.chk-r{background:rgba(220,60,60,0.2);color:#ff9999}
.chk-b{background:rgba(100,150,255,0.2);color:#b3c8ff}
.chk-g{background:rgba(255,255,255,0.08);color:var(--cinza)}
.chk-f{background:rgba(232,160,32,0.15);color:var(--ouro-claro)}

/* ── MODAL DE PARABÉNS ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:none;align-items:center;justify-content:center;
  z-index:1000;backdrop-filter:blur(4px);
}
.modal-overlay.ativo{display:flex;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:linear-gradient(135deg,var(--verde),var(--cinza-escuro));
  border:1px solid var(--ouro);
  border-radius:20px;
  padding:40px 48px;
  text-align:center;
  max-width:420px;width:90%;
  box-shadow:0 0 60px rgba(232,160,32,0.3);
  animation:popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-emoji{font-size:64px;margin-bottom:16px;display:block}
.modal-titulo{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--ouro);letter-spacing:2px;margin-bottom:8px}
.modal-msg{font-size:15px;color:rgba(240,237,230,0.85);line-height:1.6;margin-bottom:24px}
.modal-btn{
  background:var(--ouro);color:var(--verde-bg);
  border:none;padding:12px 32px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
}
.modal-btn:hover{background:var(--ouro-claro);transform:scale(1.03)}

/* ── CONFETTI ── */
.confetti-piece{
  position:fixed;width:8px;height:8px;opacity:0;
  border-radius:2px;pointer-events:none;z-index:999;
  animation:confettiFall 2.5s ease forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-10px) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(232,160,32,0.3);border-radius:3px}

/* ── RESPONSIVO ── */
@media(max-width:640px){
  .calendario{grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto}
  .header-logo{font-size:40px}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">AgroCapital 2026</div>
    <div class="header-sub">Painel de Cobertura · Goiânia · GO</div>
    <div class="header-tagline">Seu guia de campo para os 5 dias de evento</div>
  </div>

  <!-- PROGRESSO GERAL -->
  <div class="progresso-geral">
    <div class="pg-header">
      <div class="pg-titulo">Missão geral</div>
      <div class="pg-pct" id="pct-geral">0%</div>
    </div>
    <div class="pg-barra-wrap"><div class="pg-barra" id="barra-geral" style="width:0%"></div></div>
    <div class="pg-stats">
      <div class="pg-stat">Takes: <span id="stat-takes">0/0</span></div>
      <div class="pg-stat">Fotos: <span id="stat-fotos">0/0</span></div>
      <div class="pg-stat">Roteiro: <span id="stat-roteiro">0/0</span></div>
      <div class="pg-stat">Dias concluídos: <span id="stat-dias">0/5</span></div>
    </div>
  </div>

  <!-- CALENDÁRIO -->
  <div class="calendario" id="calendario"></div>

  <!-- CONTEÚDO DO DIA -->
  <div id="conteudo-dias"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <span class="modal-emoji" id="modal-emoji">🏆</span>
    <div class="modal-titulo" id="modal-titulo">MISSÃO CONCLUÍDA!</div>
    <div class="modal-msg" id="modal-msg"></div>
    <button class="modal-btn" onclick="fecharModal()">Continuar →</button>
  </div>
</div>

<script>
const DIAS = [
{
  num:1, data:'01', mes:'JUN', dia:'Segunda', tema:'Abertura do Evento',
  alerta:null,
  programacao:[
    {h:'14h30',t:'Abertura Oficial do Evento',l:'Palco Principal',tipo:'palco'},
    {h:'15h30',t:'Representatividade Feminina no Serviço Público — Gracinha Caiado, Talles Barreto, Iara Vilela',l:'Espaço Mulher',tipo:'mulher'},
    {h:'16h',t:'A atuação feminina na defesa agropecuária — Denise Toledo (Agrodefesa)',l:'Espaço Mulher',tipo:'mulher'},
    {h:'16h30',t:'Gestão e marketing em vendas — Alessandro de Brito Cunha',l:'Auditório',tipo:'aud'},
    {h:'17h',t:'O futuro do plantio — José Roberto Assy',l:'Auditório',tipo:'aud'},
  ],
  reels:[
    {
      num:1, titulo:'Abertura: o agro chegou em Goiânia', dur:'45–55s',
      contexto:'Este é o reel de abertura da cobertura. O objetivo é apresentar a feira para quem nunca foi, criar desejo e curiosidade, e estabelecer o tamanho do evento. Energia alta, cortes rápidos, mas com sentido. Não é só "olha o que tem aqui" — é "você precisa entender o que esse evento representa pro agro brasileiro."',
      takes:[
        {titulo:'ABERTURA VISUAL — Chegada ao evento',tempo:'0–4s',instrucao:'Chegue às 13h30, antes do fluxo de público. Plano geral da estrutura: fachada, totens com a logo, tratores visíveis à distância. Câmera em movimento lento da esquerda para a direita. Sem fala — som ambiente. Depois faça 3 closes rápidos: 1) logo da AgroCapital no totem, 2) roda de trator grande de baixo pra cima, 3) pessoas passando com crachá.',pergunta:null,fala:null,edicao:null,direcao:'Ângulo do chão pra cima no trator dá escala e impacto.'},
        {titulo:'ABORDAGEM 1 — Visitante chegando',tempo:'4–20s',instrucao:'Na entrada, pare alguém com cara de produtor rural (chapéu, bota, crachá). Abordagem rápida: "Posso te fazer uma pergunta rápida pro vídeo?" Câmera já ligada. Quer uma resposta de 10–15s. Enquadramento: rosto + evento ao fundo.',pergunta:'Você veio de onde pra estar aqui hoje? O que te trouxe à Agrocapital?',fala:'"Vim de Jataí, sou produtor de soja, e quero ver as novidades em máquinas." — Se vier de outro estado, esse take mostra o alcance do evento.',edicao:null,direcao:'Se a pessoa vier de outro estado, guarde esse detalhe para a legenda.'},
        {titulo:'ABORDAGEM 2 — Reação à abertura oficial',tempo:'20–35s',instrucao:'Na abertura oficial (14h30, Palco Principal), grave as autoridades e a plateia. Depois aborde alguém que estava assistindo. Pode ser qualquer perfil.',pergunta:'Você está aqui desde a abertura. O que você viu até agora que te chamou mais atenção?',fala:'"Nunca vim numa feira dessas, não esperava esse tamanho." ou "Vim pra conhecer as soluções de crédito que têm aqui."',edicao:null,direcao:'Se a pessoa parecer animada, deixa ela falar um pouco mais — você usa só 10s na edição.'},
        {titulo:'SEQUÊNCIA DE IMAGENS — Cortes rápidos',tempo:'35–45s',instrucao:'Grave 6–8 imagens de 3–5s cada, sem fala, para corte rápido com trilha: 1) Corredor principal cheio, 2) Stand de marca grande (John Deere, Valtra, Toyota), 3) Trator com close no pneu, 4) Banner AgroCapital 2026, 5) Pessoa olhando equipamento com interesse, 6) Vista geral de ponto alto.',pergunta:null,fala:null,edicao:null,direcao:'Tente pegar uma vista de ponto elevado — dá escala ao evento.'},
        {titulo:'ENCERRAMENTO',tempo:'45–52s',instrucao:'Imagem mais bonita do dia — prefira a vista geral com público e estrutura ao mesmo tempo.',pergunta:null,fala:null,edicao:'"Agrocapital 2026. Dia 1. Só o começo."',direcao:'Trilha diminui no texto final.'},
      ]

    {

      takes:[
        {titulo:'ABERTURA — Mesa redonda em andamento',tempo:'0–4s',instrucao:'Chegue antes das 9h. A mesa tem várias mulheres no painel — visualmente impactante. Grave de frente ou diagonal: participantes, microfones, plateia ao fundo. Câmera começa no plano geral e aproxima devagar.',pergunta:null,fala:null,edicao:null,direcao:'Seis ou sete mulheres numa mesa de debate num evento de agronegócio é uma cena que conta história sozinha.'},
        {titulo:'ABORDAGEM 1 — Participante da mesa',tempo:'10–28s',instrucao:'Tente combinar antes da palestra com uma das participantes — ou aborde alguém da plateia logo depois. O ideal é Monyque L. ou Vanessa R., mas qualquer participante serve.',pergunta:'O que mudou na comunicação do agro nos últimos anos? A mulher ficou mais visível nisso?',fala:'"Antes, quem falava de agro era a TV aberta. Hoje tem criadora de conteúdo no TikTok com 2 milhões de seguidores mostrando a rotina do campo. Isso mudou tudo."',edicao:null,direcao:'Essa pergunta tende a soltar respostas longas. Guarde tudo — na edição você escolhe os 15s mais fortes.'},
        {titulo:'ABORDAGEM 2 — Mulher do agro na plateia',tempo:'28–42s',instrucao:'Outra mulher — expositora, produtora, estudante — que estava assistindo ou circulando no Espaço Mulher.',pergunta:'Você usa as redes pra falar sobre o que você faz no agro? Como isso mudou o seu negócio ou carreira?',fala:'"Comecei a postar sobre a fazenda da minha família e em 6 meses tinha cliente novo chegando de outro estado." ou "Ainda tenho medo de aparecer, mas ver isso aqui me deu vontade de começar."',edicao:null,direcao:'Se a resposta for mais tímida, não corte — a vulnerabilidade conecta com o público.'},
        {titulo:'ENCERRAMENTO',tempo:'42–50s',instrucao:'Última imagem: Espaço Mulher ainda cheio ou painel sendo encerrado com aplausos.',pergunta:null,fala:null,edicao:'"A voz do agro tem muito sotaque feminino. Agrocapital 2026."',direcao:''},

      takes:[
        {titulo:'ABERTURA — 1º Congresso Inova Agro',tempo:'0–4s',instrucao:'Grave a abertura do Congresso às 14h com Fernando Barnabé. Plano do auditório cheio + banner. Câmera do fundo ou lateral.',pergunta:null,fala:null,edicao:null,direcao:'O banner "Inova Agro — 1º Congresso" na tela já passa credibilidade.'},
        {titulo:'ABORDAGEM 1 — Participante do congresso',tempo:'4–20s',instrucao:'No intervalo entre 15h e 17h, aborde alguém saindo do painel de startups — jovem, técnico, estudante ou empresário.',pergunta:'Qual tecnologia você acha que vai mudar mais o campo nos próximos anos? Teve algo aqui hoje que te surpreendeu?',fala:'"Não imaginava o nível de inovação que existe aqui. Tinha startup daqui de Goiás que nunca ouvi falar e a solução é incrível."',edicao:null,direcao:'Jovens tendem a responder com mais entusiasmo. Um produtor mais velho falando sobre inovação pode ser ainda mais poderoso.'},
        {titulo:'ABORDAGEM 2 — Representante de startup',tempo:'20–36s',instrucao:'Procure um stand de startup ou solução tecnológica. A pergunta é objetiva — quer uma resposta de 10–12s que qualquer pessoa entenda.',pergunta:'Me fala em uma frase: qual problema a sua solução resolve pro produtor rural?',fala:'"A gente reduz o desperdício de defensivo em até 40% usando imagem de satélite pra mapear onde tem praga de verdade."',edicao:null,direcao:'Se a resposta for muito técnica: "Como você explicaria isso pra quem nunca ouviu falar?"'},
        {titulo:'IMAGENS — Eike Batista e clima do auditório',tempo:'36–50s',instrucao:'Às 17h, Eike Batista no auditório. Grave de longe ou da lateral: plateia, telão, clima geral. Não é necessário gravar a fala.',pergunta:null,fala:null,edicao:null,direcao:'Plano geral do auditório cheio com telão ao fundo já passa o peso do momento.'},
        {titulo:'ENCERRAMENTO',tempo:'50–58s',instrucao:'Networking no corredor ou saída do auditório.',pergunta:null,fala:null,edicao:'"O campo do futuro está sendo construído agora. Inova Agro — Agrocapital 2026."',direcao:''},

        {titulo:'ABORDAGEM 1 — Mulher jovem (sucessora)',tempo:'10–28s',instrucao:'Procure uma mulher jovem — filha de produtor, estudante de agronomia ou veterinária. Se ela hesitar: "Pode falar à vontade, sem nome se preferir."',pergunta:'Você é filha de produtor? Sempre soube que ia continuar no agro, ou foi uma descoberta no caminho?',fala:'"Meu pai nunca imaginou que eu ia querer tomar conta da fazenda — achava que eu ia virar médica. Mas quando eu peguei o trator pela primeira vez, entendi que era isso." ou "Tive muita resistência da família. Hoje sou eu que gerencio tudo."',edicao:null,direcao:'DEIXA A EMOÇÃO APARECER. Se a pessoa emocionar, não interrompa. Esse take pode ser o mais poderoso de toda a cobertura.'},
        {titulo:'ABORDAGEM 2 — Mulher experiente (gestora/palestrante)',tempo:'28–44s',instrucao:'Aborde Fabíola Lino ou Letícia Pereira após a palestra, ou uma gestora da plateia.',pergunta:'O que mudou na gestão da fazenda quando as mulheres assumiram a frente? O resultado foi diferente?',fala:'"Quando a mulher assume a gestão, a fazenda vira empresa. Ela organiza o financeiro, cuida das pessoas, pensa no longo prazo. Não é melhor nem pior — é diferente, e faz muita diferença."',edicao:null,direcao:'Palmilhe o espaço durante os intervalos para encontrar as pessoas certas.'},

        {titulo:'ENCERRAMENTO',tempo:'55–63s',instrucao:'Duas mulheres conversando de costas ou o Espaço Mulher se esvaziando.',pergunta:null,fala:null,edicao:'"A próxima geração do agro tem nome de mulher. Agrocapital 2026."',direcao:'Trilha suave — termina com leveza e força ao mesmo tempo.'},

      takes:[

        {titulo:'ABORDAGEM 1 — Produtor/técnico com opinião',tempo:'3–20s',instrucao:'No intervalo do almoço ou antes do painel, aborde alguém no corredor com perfil de produtor ou técnico agrícola.',pergunta:'Você já trabalha com bioinsumos ou agricultura regenerativa? Como foi a mudança?',fala:'"Comecei em 20% da área como teste. Hoje estou expandindo porque o resultado foi melhor do que esperava — e o custo caiu."',edicao:null,direcao:'A resposta "ainda não fiz mas quero entender" representa a maioria do público — também é válida.'},
        {titulo:'ABORDAGEM 2 — Produtor cético (contraponto)',tempo:'20–36s',instrucao:'Busque alguém que questione se dá pra ser sustentável e lucrativo. Cria tensão narrativa e engajamento.',pergunta:'Dá pra ser sustentável e ainda ter lucro? O que você acha?',fala:'"Acredito que sim, mas o mercado ainda não paga mais por produto sustentável no Brasil. Quando isso mudar, vai decolar."',edicao:null,direcao:'Perguntas com leve provocação geram respostas mais honestas e interessantes.'},

// ─── STATE ───
const STORAGE_KEY = 'agrocapital2026_progresso';
let checkState = {};
let diaAtivo = null;

function salvarEstado(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(checkState)); }catch(e){}
}
function carregarEstado(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) checkState = JSON.parse(saved);
  }catch(e){ checkState={}; }
}
function restaurarUI(){
  Object.keys(checkState).forEach(k=>{
    if(!checkState[k]) return;
    if(k.startsWith('r_')){
      const cb=document.getElementById('tcb-'+k);
      const tx=document.getElementById('ttxt-'+k);
      const bloco=document.getElementById('tb-'+k);
      if(cb){cb.classList.add('ok');cb.textContent='✓';}
      if(tx) tx.classList.add('ok');
      if(bloco) bloco.classList.add('concluido');
    } else {
      const b=document.getElementById('chkb-'+k);
      const t=document.getElementById('chkt-'+k);
      const item=document.getElementById('chki-'+k);
      if(b){b.classList.add('ok');b.textContent='✓';}
      if(t) t.classList.add('ok');
      if(item) item.classList.add('ok');
    }
  });
  DIAS.forEach((_,di)=>updateDiaProgresso(di));
}

function totalItens(dia){
  let reel=0;
  dia.reels.forEach(r=>reel+=r.takes.length);
  return { takes: dia.takes.length, fotos: dia.fotos.length, reel };
}
function contarChecked(dia,di){
  let takes=0,fotos=0,reel=0;
  dia.takes.forEach((_,i)=>{ if(checkState[`t_${di}_${i}`]) takes++ });
  dia.fotos.forEach((_,i)=>{ if(checkState[`f_${di}_${i}`]) fotos++ });
  dia.reels.forEach((r,ri)=>r.takes.forEach((_,ti)=>{ if(checkState[`r_${di}_${ri}_${ti}`]) reel++ }));
  return {takes,fotos,reel};
}
function pctDia(di){
  const dia=DIAS[di], tot=totalItens(dia), chk=contarChecked(dia,di);
  const t=tot.takes+tot.fotos+tot.reel;
  const d=chk.takes+chk.fotos+chk.reel;
  return t===0?0:Math.round(d/t*100);
}
function pctGeral(){
  let tot=0,d=0;
  DIAS.forEach((dia,di)=>{
    const t=totalItens(dia), c=contarChecked(dia,di);
    tot+=t.takes+t.fotos+t.reel;
    d+=c.takes+c.fotos+c.reel;
  });
  return tot===0?0:Math.round(d/tot*100);
}
function updateStats(){
  let totT=0,totF=0,totR=0,dT=0,dF=0,dR=0,diasOk=0;
  DIAS.forEach((dia,di)=>{
    const t=totalItens(dia),c=contarChecked(dia,di);
    totT+=t.takes; totF+=t.fotos; totR+=t.reel;
    dT+=c.takes; dF+=c.fotos; dR+=c.reel;
    if(pctDia(di)===100) diasOk++;
  });
  const pg=pctGeral();
  document.getElementById('pct-geral').textContent=pg+'%';
  document.getElementById('barra-geral').style.width=pg+'%';
  document.getElementById('stat-takes').textContent=`${dT}/${totT}`;
  document.getElementById('stat-fotos').textContent=`${dF}/${totF}`;
  document.getElementById('stat-roteiro').textContent=`${dR}/${totR}`;
  document.getElementById('stat-dias').textContent=`${diasOk}/5`;
  // update calendário
  DIAS.forEach((_,di)=>{
    const p=pctDia(di);
    const el=document.getElementById(`cal-fill-${di}`);
    const pt=document.getElementById(`cal-pct-${di}`);
    const card=document.getElementById(`cal-card-${di}`);
    if(el) el.style.width=p+'%';
    if(pt) pt.textContent=p+'%';
    if(card){
      card.classList.toggle('concluido',p===100);
    }
  });
}

  for(let i=0;i<60;i++){

    el.className='confetti-piece';

}

  if(modalAberto){modalFila.push({emoji,titulo,msg});return;}
  modalAberto=true;

function buildCalendario(){
  const cal=document.getElementById('calendario');
  DIAS.forEach((d,di)=>{
    const card=document.createElement('div');
    card.className='cal-card'+(diaAtivo===di?' ativo':'');
    card.id=`cal-card-${di}`;
    card.innerHTML=`
      <div class="cal-check">✓</div>
      <div class="cal-mes">${d.mes}</div>
      <div class="cal-num">${d.data}</div>
      <div class="cal-dia">${d.dia}</div>
      <div class="cal-tema">${d.tema}</div>
      <div class="cal-minibarra"><div class="cal-minifill" id="cal-fill-${di}" style="width:0%"></div></div>
      <div class="cal-pct-txt" id="cal-pct-${di}">0%</div>
    `;
    card.addEventListener('click',()=>abrirDia(di));
    cal.appendChild(card);
  });
}

function abrirDia(di){
  diaAtivo = diaAtivo===di ? null : di;
  document.querySelectorAll('.cal-card').forEach((c,i)=>c.classList.toggle('ativo',i===diaAtivo));
  document.querySelectorAll('.dia-conteudo').forEach((c,i)=>c.classList.toggle('ativo',i===diaAtivo));
  if(diaAtivo!==null){
    document.getElementById(`dia-${diaAtivo}`).scrollIntoView({behavior:'smooth',block:'start'});
  }
}

    <table class="prog-tabela">`;
    dia.programacao.forEach(p=>{
      html+=`<tr><td class="prog-hora">${p.h}</td><td class="prog-tema">${p.t}${badgeLoc(p.tipo)}</td><td class="prog-local">${p.l}</td></tr>`;
    });
    html+=`</table>`;

    // Reels
    html+=`<div class="secao-titulo">Roteiros dos reels</div>`;
    dia.reels.forEach((reel,ri)=>{
      const reelId=`reel-${di}-${ri}`;
      html+=`<div class="reel-card">
        <div class="reel-header" onclick="toggleReel('${reelId}')">
          <div class="reel-num-badge">${reel.num}</div>
          <div class="reel-info">
            <div class="reel-titulo">${reel.titulo}</div>
            <div class="reel-dur">⏱ ${reel.dur}</div>
          </div>
          <div class="reel-toggle" id="${reelId}-chevron">▼</div>
        </div>
        <div class="reel-body" id="${reelId}">
          <div class="contexto-box">${reel.contexto}</div>`;

      reel.takes.forEach((take,ti)=>{
        const k=`r_${di}_${ri}_${ti}`;
        const tkId=`take-${di}-${ri}-${ti}`;
        html+=`<div class="take-bloco" id="tb-${k}">
          <div class="take-header" onclick="toggleTakeDetalhes('${tkId}', event)" data-key="${k}" data-di="${di}" data-ri="${ri}" data-ti="${ti}">
            <div class="take-cb" id="tcb-${k}"></div>
            <div class="take-num">T${ti+1}</div>
            <div class="take-titulo-txt" id="ttxt-${k}">${take.titulo}</div>
            <div class="take-expand" id="tex-${tkId}">▼</div>
          </div>
          <div class="take-detalhe" id="${tkId}">`;

        if(take.tempo) html+=`<div class="take-campo"><div class="take-label">Tempo</div><div class="take-valor">${take.tempo}</div></div>`;
        if(take.instrucao) html+=`<div class="take-campo"><div class="take-label">Instrução de captação</div><div class="take-valor">${take.instrucao}</div></div>`;
        if(take.pergunta) html+=`<div class="take-campo"><div class="take-label">Pergunta guia</div><div class="take-valor destaque">${take.pergunta}</div></div>`;
        if(take.fala) html+=`<div class="take-campo"><div class="take-label">Exemplo de fala</div><div class="take-valor">${take.fala}</div></div>`;
        if(take.edicao) html+=`<div class="take-campo"><div class="take-label">Texto para edição</div><div class="take-valor destaque">${take.edicao}</div></div>`;
        if(take.direcao) html+=`<div class="take-campo"><div class="take-label">Direção</div><div class="take-valor">${take.direcao}</div></div>`;

        html+=`</div></div>`;
      });
      html+=`</div></div>`;
    });

    // Checklist takes
    html+=`<div class="secao-titulo">Checklist de takes de vídeo</div>
    <div class="checklist-grid">`;
    dia.takes.forEach((item,i)=>{
      const k=`t_${di}_${i}`;
      const bc=item.o==='r'?'chk-r':item.o==='b'?'chk-b':'chk-g';
      const bl=item.o==='r'?'obrig':item.o==='b'?'bom ter':'extra';
      html+=`<div class="chk-item" id="chki-${k}" onclick="toggleCheck('${k}','${di}','takes')">
        <div class="chk-box" id="chkb-${k}"></div>
        <div class="chk-txt" id="chkt-${k}">${item.t}</div>
        <span class="chk-badge ${bc}">${bl}</span>
      </div>`;
    });
    html+=`</div>`;

    // Checklist fotos
    html+=`<div class="secao-titulo">Checklist de fotos (mínimo 10–20/dia)</div>
    <div class="checklist-grid">`;
    dia.fotos.forEach((item,i)=>{
      const k=`f_${di}_${i}`;
      html+=`<div class="chk-item" id="chki-${k}" onclick="toggleCheck('${k}','${di}','fotos')">
        <div class="chk-box" id="chkb-${k}"></div>
        <div class="chk-txt" id="chkt-${k}">${item.t}</div>
        <span class="chk-badge chk-f">📷 foto</span>
      </div>`;
    });
    html+=`</div>`;

    el.innerHTML=html;
    wrap.appendChild(el);
  });
}

// ─── TOGGLE HANDLERS ───
function toggleReel(id){
  const body=document.getElementById(id);
  const chev=document.getElementById(id+'-chevron');
  const isOpen=body.classList.toggle('aberto');
  chev.classList.toggle('aberto',isOpen);
}

function toggleTakeDetalhes(tkId, e){
  // Se clicou no checkbox, só marca
  const target=e.target;
  if(target.classList.contains('take-cb')||target.closest('.take-cb')){return;}
  const det=document.getElementById(tkId);
  const chev=document.getElementById('tex-'+tkId);
  const isOpen=det.classList.toggle('aberto');
  chev.classList.toggle('aberto',isOpen);
}

document.addEventListener('click',function(e){
  const header=e.target.closest('.take-header');
  if(!header) return;
  const cb=header.querySelector('.take-cb');
  if(e.target===cb||cb.contains(e.target)){
    const k=cb.id.replace('tcb-','');
    const di=parseInt(header.dataset.di);
    const ri=parseInt(header.dataset.ri);
    const ti=parseInt(header.dataset.ti);
    toggleRoteiroTake(k,di,ri,ti);
  }
});

function toggleRoteiroTake(k,di,ri,ti){
  checkState[k]=!checkState[k];
  salvarEstado();
  const cb=document.getElementById('tcb-'+k);
  const tx=document.getElementById('ttxt-'+k);
  const bloco=document.getElementById('tb-'+k);
  if(cb) cb.classList.toggle('ok',checkState[k]);
  if(cb) cb.textContent=checkState[k]?'✓':'';
  if(tx) tx.classList.toggle('ok',checkState[k]);
  if(bloco) bloco.classList.toggle('concluido',checkState[k]);

  updateDiaProgresso(di);
  updateStats();

  if(checkState[k]){
    const reel=DIAS[di].reels[ri];
    const allReel=reel.takes.every((_,t2)=>checkState[`r_${di}_${ri}_${t2}`]);
    if(allReel){
      const m=msgs_reel[Math.floor(Math.random()*msgs_reel.length)];
      mostrarModal(m.emoji,m.t,m.m);
    }
    verificarDia(di);
  }
}

function toggleCheck(k,di,tipo){
  checkState[k]=!checkState[k];
  salvarEstado();
  const b=document.getElementById('chkb-'+k);
  const t=document.getElementById('chkt-'+k);
  const item=document.getElementById('chki-'+k);
  if(b){b.classList.toggle('ok',checkState[k]);b.textContent=checkState[k]?'✓':'';}
  if(t) t.classList.toggle('ok',checkState[k]);
  if(item) item.classList.toggle('ok',checkState[k]);

  updateDiaProgresso(di);
  updateStats();
  if(checkState[k]) verificarDia(di);
}

function updateDiaProgresso(di){
  const p=pctDia(di);
  const fill=document.getElementById(`dpf-${di}`);
  const pct=document.getElementById(`dpp-${di}`);
  if(fill) fill.style.width=p+'%';
  if(pct) pct.textContent=p+'%';
}

function verificarDia(di){
  const p=pctDia(di);
  if(p===100){
    if(DIAS.every((_,i)=>pctDia(i)===100)){
      setTimeout(()=>mostrarModal(msg_geral.emoji,msg_geral.t,msg_geral.m),400);
    } else {
      const m=msgs_dia[Math.floor(Math.random()*msgs_dia.length)];
      setTimeout(()=>mostrarModal(m.emoji,m.t,m.m),400);
    }
  }
}

// ─── INIT ───
carregarEstado();
buildCalendario();
buildDias();
restaurarUI();
updateStats();
</script>
